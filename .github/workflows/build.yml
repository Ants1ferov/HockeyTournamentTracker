name: Сборка проекта

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Установка MAUI
        run: dotnet workload install maui

      - name: Восстановление зависимостей
        run: dotnet restore ./HockeyTournamentTracker.csproj

      - name: Сборка проекта
        run: dotnet build ./HockeyTournamentTracker.csproj -f net10.0-android -c Release --no-restore